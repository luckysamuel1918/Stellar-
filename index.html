  <body class="bg-westcoast-bg font-sans dark:bg-gray-900 dark:text-gray-200">

    <div id="error-fallback" style="display: none; text-align: center; padding: 40px; font-family: 'Inter', sans-serif; background-color: #F6F9FC; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center;">
        <div>
            <h1 style="font-size: 2rem; font-weight: bold; color: #0A2540;">Oops! Something went wrong.</h1>
            <p style="margin-top: 1rem; color: #6B7280;">We've encountered an unexpected error. Please try refreshing the page.</p>
            <button onclick="window.location.reload()" style="margin-top: 1.5rem; padding: 0.75rem 1.5rem; background-color: #0077FF; color: white; border: none; border-radius: 9999px; font-weight: bold; cursor: pointer;">
                Refresh Page
            </button>
        </div>
    </div>
    <div id="root"></div>

    <script>
      // Global Error Handler
      function showErrorFallback() {
          var root = document.getElementById('root');
          var fallback = document.getElementById('error-fallback');
          if (root) root.style.display = 'none';
          if (fallback) fallback.style.display = 'flex';
      }

      window.addEventListener('error', function(event) {
          console.error('Global error caught:', event.error);
          showErrorFallback();
      });

      window.addEventListener('unhandledrejection', function(event) {
          console.error('Unhandled promise rejection caught:', event.reason);
          showErrorFallback();
      });
    </script>
    <script type="module" src="./index.tsx"></script>
  </body>
